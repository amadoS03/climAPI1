<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClimaAPI - Pronóstico del Clima</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar__brand">
      <span class="topbar__logo">🌤️</span>
      <h1>Clima<span>API</span></h1>
    </div>
    <form id="search-form" class="search-form">
      <input id="city-input" type="text" placeholder="Buscar ciudad (ej. Ciudad de México)" autocomplete="off" required />
      <button type="submit">Buscar</button>
    </form>
  </header>

  <div class="layout">
    <!-- Sidebar de categorías (vistas del pronóstico) -->
    <aside class="sidebar" aria-label="Categorías del pronóstico">
      <h2 class="sidebar__title">Vistas</h2>
      <ul class="sidebar__list">
        <li><button class="cat-btn active" data-category="actual">Clima Actual</button></li>
        <li><button class="cat-btn" data-category="horas">Por Horas (24h)</button></li>
        <li><button class="cat-btn" data-category="dias">Próximos 7 Días</button></li>
      </ul>

      <h2 class="sidebar__title sidebar__title--spaced">Ciudades sugeridas</h2>
      <ul class="sidebar__list">
        <li><button class="city-btn" data-city="Ciudad de México">Ciudad de México</button></li>
        <li><button class="city-btn" data-city="Bogotá">Bogotá</button></li>
        <li><button class="city-btn" data-city="Madrid">Madrid</button></li>
        <li><button class="city-btn" data-city="Buenos Aires">Buenos Aires</button></li>
      </ul>
    </aside>

    <!-- Contenido principal -->
    <main class="content">

      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Buscando ciudad "Ciudad de México"...</p>
      </div>

      <div id="error-box" class="error-box" hidden>
        <p id="error-message">⚠️ No se pudo encontrar la ciudad o no hay conexión a internet.</p>
        <button id="retry-btn">Reintentar</button>
      </div>

      <div id="results" hidden>
        <div id="location-name" class="location-name"></div>
        <div id="current-summary" class="current-summary"></div>

        <div class="content__header">
          <h2 id="current-category">Clima Actual</h2>
          <span id="result-count" class="result-count"></span>
        </div>

        <section id="item-grid" class="item-grid" aria-live="polite"></section>
      </div>

    </main>
  </div>

  <footer class="footer">
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
